    AuthAllowed:
      description: |-
        A challenge containing the list of allowed authentication types
        that can satisfy the next step. These may have inner types with
        required context.
      oneOf:
      - enum:
        - anonymous
        type: string
      - enum:
        - backupcode
        type: string
      - enum:
        - password
        type: string
      - enum:
        - totp
        type: string
      - $ref: "#/components/schemas/AuthAllowed_oneOf"
      - $ref: "#/components/schemas/AuthAllowed_oneOf_1"
    AuthCredential:
      description: The credential challenge provided by a user.
      oneOf:
      - enum:
        - anonymous
        type: string
      - $ref: "#/components/schemas/AuthCredential_oneOf"
      - $ref: "#/components/schemas/AuthCredential_oneOf_1"
      - $ref: "#/components/schemas/AuthAllowed_oneOf"
      - $ref: "#/components/schemas/AuthCredential_oneOf_2"
      - $ref: "#/components/schemas/AuthCredential_oneOf_3"
    AuthIssueSession:
      description: The type of session that should be issued to the client.
      enum:
      - token
      - cookie
      type: string
    AuthMech:
      description: The mechanisms that may proceed in this authentication
      enum:
      - anonymous
      - password
      - passwordbackupcode
      - passwordmfa
      - passwordsecuritykey
      - passkey
      - oauth2trust
      type: string
    AuthRequest:
      description: A request for the next step of an authentication.
      example:
        step:
          init: init
      properties:
        step:
          $ref: "#/components/schemas/AuthStep"
      required:
      - step
    AuthResponse:
      example:
        sessionid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        state:
          choose:
          - anonymous
          - anonymous
      properties:
        sessionid:
          format: uuid
          type: string
        state:
          $ref: "#/components/schemas/AuthState"
      required:
      - sessionid
      - state
    AuthState:
      description: The response to an AuthStep request.
      oneOf:
      - $ref: "#/components/schemas/AuthState_oneOf"
      - $ref: "#/components/schemas/AuthState_oneOf_1"
      - $ref: "#/components/schemas/AuthState_oneOf_2"
      - $ref: "#/components/schemas/AuthState_oneOf_3"
    AuthStep:
      description: |-
        Authentication to Kanidm is a stepped process.

        The session is first initialised with the requested username.

        In response the list of supported authentication mechanisms is provided.

        The user chooses the authentication mechanism to proceed with.

        The server responds with a challenge that the user provides a credential
        to satisfy. This challenge and response process continues until a credential
        fails to validate, an error occurs, or successful authentication is complete.
      oneOf:
      - $ref: "#/components/schemas/AuthStep_oneOf"
      - $ref: "#/components/schemas/AuthStep_oneOf_1"
      - $ref: "#/components/schemas/AuthStep_oneOf_2"
      - $ref: "#/components/schemas/AuthStep_oneOf_3"
