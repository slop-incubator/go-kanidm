    UserAuthToken:
      description: |-
        The currently authenticated user, and any required metadata for them
        to properly authorise them. This is similar in nature to oauth and the krb
        PAC/PAD structures. This information is transparent to clients and CAN
        be parsed by them!

        This structure and how it works will *very much* change over time from this
        point onward! This means on updates, that sessions will invalidate in many
        cases.
      example:
        spn: spn
        purpose: readonly
        displayname: displayname
        session_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        expiry: 2000-01-23T04:56:07.000+00:00
        limit_search_max_results: 0
        limit_search_max_filter_test: 0
        mail_primary: mail_primary
        issued_at: 2000-01-23T04:56:07.000+00:00
        uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        ui_hints:
        - experimentalfeatures
        - experimentalfeatures
      properties:
        session_id:
          format: uuid
          type: string
        issued_at:
          format: date-time
          type: string
        expiry:
          description: |-
            If none, there is no expiry, and this is always valid. If there is
            an expiry, check that the current time < expiry.
          format: date-time
          nullable: true
          type: string
        purpose:
          $ref: "#/components/schemas/UatPurpose"
        uuid:
          format: uuid
          type: string
        displayname:
          type: string
        spn:
          type: string
        mail_primary:
          nullable: true
          type: string
        ui_hints:
          items:
            $ref: "#/components/schemas/UiHint"
          type: array
          uniqueItems: true
        limit_search_max_results:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        limit_search_max_filter_test:
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - displayname
      - issued_at
      - purpose
      - session_id
      - spn
      - ui_hints
      - uuid
