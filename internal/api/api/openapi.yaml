components:
  schemas:
    AccountUnixExtend:
      additionalProperties: false
      description: Request addition of unix attributes to an account
      example:
        shell: shell
        gidnumber: 0
      properties:
        gidnumber:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        shell:
          description: The internal attribute is "loginshell" but we use shell in
            the API currently
          nullable: true
          type: string
    ApiToken:
      example:
        account_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        token_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        purpose: readonly
        label: label
        expiry: 2000-01-23T04:56:07.000+00:00
        issued_at: 2000-01-23T04:56:07.000+00:00
      properties:
        account_id:
          format: uuid
          type: string
        token_id:
          format: uuid
          type: string
        label:
          type: string
        expiry:
          format: date-time
          nullable: true
          type: string
        issued_at:
          format: date-time
          type: string
        purpose:
          $ref: "#/components/schemas/ApiTokenPurpose"
      required:
      - account_id
      - issued_at
      - label
      - token_id
    ApiTokenGenerate:
      description: A request to generate a new API token for a service account
      example:
        read_write: true
        compact: true
        label: label
        expiry: 2000-01-23T04:56:07.000+00:00
      properties:
        label:
          type: string
        expiry:
          format: date-time
          nullable: true
          type: string
        read_write:
          type: boolean
        compact:
          type: boolean
      required:
      - label
      - read_write
    ApiTokenPurpose:
      enum:
      - readonly
      - readwrite
      - synchronise
      type: string
    AppLink:
      description: |-
        This is a description of a linked or connected application for a user. This is
        used in the UI to render applications on the dashboard for a user to access.
      example:
        Oauth2:
          has_image: true
          name: name
          display_name: display_name
          redirect_url: https://openapi-generator.tech
      properties:
        Oauth2:
          $ref: "#/components/schemas/AppLink_Oauth2"
      required:
      - Oauth2
    Attribute:
      oneOf:
      - enum:
        - account
        type: string
      - enum:
        - accountexpire
        type: string
      - enum:
        - accountvalidfrom
        type: string
      - enum:
        - accountsoftlockexpire
        type: string
      - enum:
        - acpcreateattr
        type: string
      - enum:
        - acpcreateclass
        type: string
      - enum:
        - acpenable
        type: string
      - enum:
        - acpmodifyclass
        type: string
      - enum:
        - acpmodifypresentclass
        type: string
      - enum:
        - acpmodifyremoveclass
        type: string
      - enum:
        - acpmodifypresentattr
        type: string
      - enum:
        - acpmodifyremovedattr
        type: string
      - enum:
        - acpreceiver
        type: string
      - enum:
        - acpreceivergroup
        type: string
      - enum:
        - acpsearchattr
        type: string
      - enum:
        - acptargetscope
        type: string
      - enum:
        - apitokensession
        type: string
      - enum:
        - applicationpassword
        type: string
      - enum:
        - applicationurl
        type: string
      - enum:
        - attestedpasskeys
        type: string
      - enum:
        - attr
        type: string
      - enum:
        - attributename
        type: string
      - enum:
        - attributetype
        type: string
      - enum:
        - authsessionexpiry
        type: string
      - enum:
        - authpasswordminimumlength
        type: string
      - enum:
        - badlistpassword
        type: string
      - enum:
        - certificate
        type: string
      - enum:
